{% extends 'base.html' %}

{% block title %}New Patient Registration - PremiumCare{% endblock %}

{% block nav_links %}
<a href="/" class="nav-link">🏠 Home</a>
<a href="/patient_portal" class="nav-link">👤 Patient Portal</a>
<a href="/" class="nav-link" style="color: #ef4444;">🚪 Logout</a>
{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 2rem 0;">
    <div class="glass-panel" style="width: 100%; max-width: 600px;">
        <div class="text-center mb-4">
            <h2>New Patient Registration</h2>
            <p>Please enter the details below.</p>
        </div>

        <form method="POST" action="/process_patient">

            <input type="hidden" name="treatment_type" value="New Treatment">

            <div class="form-group">
                <label for="patient_id">Assigned Patient ID </label>
                <input type="text" id="patient_id" name="patient_id" value="{{ next_id }}" readonly>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="first_initial">First Initial</label>
                    <input type="text" id="first_initial" name="first_initial" placeholder="e.g., J" maxlength="5"
                        required>
                </div>

                <div class="form-group">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="e.g., Doe" required>
                </div>
            </div>

            <div class="grid-3">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="0" max="120" required>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="race">Race / Ethnicity</label>
                    <input type="text" id="race" name="race" placeholder="e.g., Asian">
                </div>
            </div>

            <div class="form-group">
                <label for="department">Department Required</label>
                <select id="department" name="department" required>
                    <option value="" disabled selected>Select Department</option>
                    <option>General Medicine</option>
                    <option>Cardiology</option>
                    <option>Orthopedics</option>
                    <option>Neurology</option>
                    <option>Pediatrics</option>
                    <option>Emergency Trauma</option>
                    <option>Dermatology</option>
                    <option>ENT</option>
                    <option>Gynecology</option>
                    <option>Radiology</option>
                    <option>Oncology</option>
                    <option>Nephrology</option>
                    <option>Urology</option>
                    <option>Gastroenterology</option>
                    <option>Pulmonology</option>
                    <option>Endocrinology</option>
                    <option>Psychiatry</option>
                    <option>Ophthalmology</option>
                    <option>Hematology</option>
                    <option>Plastic Surgery</option>
                    <option>Anesthesiology</option>
                    <option>Rheumatology</option>
                    <option>Infectious Diseases</option>
                    <option>Geriatrics</option>
                    <option>Rehabilitation Medicine</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="admission_status">Admission Status</label>
                    <select id="admission_status" name="admission_status" required>
                        <option value="" disabled selected>Select Status</option>
                        <option value="1">Admitted</option>
                        <option value="0">Not Admitted</option>
                        <option value="2">Emergency</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="satisfaction">Initial Satisfaction Score (1-5)</label>
                    <input type="number" id="satisfaction" name="satisfaction" min="1" max="5">
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-2" style="width: 100%;">
                Submit & Allocate Doctor ➔
            </button>

        </form>
    </div>
</div>
{% endblock %}
